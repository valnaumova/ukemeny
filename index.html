<style>
:root{--cream:#FAF7F2;--paper:#F3EEE6;--ink:#1C1A17;--ink-muted:#6B6559;--ink-light:#A09890;--green:#2D5016;--green-bg:#EAF0E0;--orange:#C4521A;--orange-bg:#FAF0E8;--blue:#1A3A5C;--blue-bg:#E8EFF6;--amber:#8C5E00;--amber-bg:#FBF3E0;--red:#8B2020;--red-bg:#FCEBEB;--purple:#3C2A6B;--purple-bg:#EEEDFE;--border:rgba(28,26,23,0.1);--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
header{background:var(--ink);color:var(--cream);padding:2rem 1.5rem 1.5rem;}
.hi{max-width:700px;margin:0 auto;}
.ht{font-family:'Fraunces',serif;font-size:clamp(2rem,6vw,2.8rem);font-weight:300;line-height:1.1;letter-spacing:-0.02em;}
.ht em{font-style:italic;color:rgba(255,255,255,0.45);}
.hm{font-size:12px;color:rgba(255,255,255,0.45);margin-top:6px;}
.tb{display:flex;gap:4px;margin-top:1.5rem;flex-wrap:wrap;}
.tbtn{padding:7px 16px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.55);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.tbtn.active{background:var(--cream);color:var(--ink);border-color:var(--cream);}
main{max-width:700px;margin:0 auto;padding:1.5rem;}
.tp{display:none;}.tp.active{display:block;}
.ws{background:white;border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:13px;line-height:1.9;color:var(--ink-muted);}
.ws strong{color:var(--ink);}
.lg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-muted);}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.dc{background:white;border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:0.85rem;overflow:hidden;transition:box-shadow 0.2s;}
.dc:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.dc.late{border-left:3px solid #E24B4A;border-radius:0 var(--radius) var(--radius) 0;}
.dc.precook{border-left:3px solid var(--amber);border-radius:0 var(--radius) var(--radius) 0;}
.dc.holiday{border-left:3px solid #1D9E75;border-radius:0 var(--radius) var(--radius) 0;}
.dc.ooo{border-left:3px solid #7F77DD;border-radius:0 var(--radius) var(--radius) 0;}
.ct{display:grid;grid-template-columns:68px 1fr auto;align-items:center;gap:1rem;padding:1.1rem 1.25rem;cursor:pointer;}
.da{text-align:center;}
.dab{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-light);}
.dn{font-family:'Fraunces',serif;font-size:2rem;font-weight:300;line-height:1;color:var(--ink);}
.dm{font-size:10px;color:var(--ink-light);}
.dt{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.tag-poultry{background:var(--purple-bg);color:var(--purple);}
.tag-fish{background:var(--blue-bg);color:var(--blue);}
.tag-veg{background:var(--green-bg);color:var(--green);}
.tag-soup{background:var(--amber-bg);color:var(--amber);}
.tag-taco{background:var(--orange-bg);color:var(--orange);}
.tag-weekend{background:var(--paper);color:var(--ink-muted);}
.tag-holiday{background:var(--green-bg);color:var(--green);}
.tag-ooo{background:var(--purple-bg);color:var(--purple);}
.dn2{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:400;line-height:1.3;color:var(--ink);}
.dt2{font-size:11px;color:var(--ink-light);margin-top:3px;}
.ei{font-size:16px;color:var(--ink-light);transition:transform 0.25s;}
.dc.open .ei{transform:rotate(180deg);}
.cb{display:none;border-top:0.5px solid var(--border);padding:1rem 1.25rem;background:var(--paper);}
.dc.open .cb{display:block;}
.cn{font-size:12px;background:white;border-radius:8px;padding:6px 10px;margin-bottom:10px;border:0.5px solid var(--border);color:var(--ink-muted);line-height:1.6;}
.cn.warn{border-color:rgba(226,75,74,0.3);background:var(--red-bg);color:var(--red);}
.cn.ok{border-color:rgba(29,158,117,0.3);background:var(--green-bg);color:var(--green);}
.cn.precook{border-color:rgba(140,94,0,0.3);background:var(--amber-bg);color:var(--amber);}
.cn.ooo{border-color:rgba(127,119,221,0.3);background:var(--purple-bg);color:var(--purple);}
.cn.holiday{border-color:rgba(29,158,117,0.3);background:var(--green-bg);color:var(--green);}
.il{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-light);margin-bottom:5px;}
.ig{font-size:13px;color:var(--ink-muted);line-height:1.8;margin-bottom:0.75rem;}
.rl{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--orange);text-decoration:none;border:0.5px solid currentColor;border-radius:20px;padding:5px 12px;transition:all 0.15s;}
.rl:hover{background:var(--orange);color:white;}
.ss{margin-bottom:1.25rem;}
.st{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-light);margin-bottom:8px;padding-left:2px;}
.si{background:white;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.sr{display:grid;grid-template-columns:28px 1fr auto auto;align-items:center;gap:8px;padding:9px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;}
.sr:last-child{border-bottom:none;}
.sr:hover{background:var(--paper);}
.sr.checked{opacity:0.4;}
.cc{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.sr.checked .cc{background:var(--green);border-color:var(--green);}
.cc svg{display:none;}
.sr.checked .cc svg{display:block;}
.in{font-size:13px;color:var(--ink);}
.sr.checked .in{text-decoration:line-through;color:var(--ink-light);}
.fp{font-size:10px;font-weight:500;padding:2px 6px;border-radius:10px;white-space:nowrap;}
.fw{background:var(--green-bg);color:var(--green);}
.fb{background:var(--purple-bg);color:var(--purple);}
.fm{background:var(--amber-bg);color:var(--amber);}
.ft{background:var(--orange-bg);color:var(--orange);}
.mb{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;color:var(--blue);background:var(--blue-bg);border-radius:7px;padding:3px 8px;text-decoration:none;white-space:nowrap;transition:all 0.15s;}
.mb:hover{background:var(--blue);color:white;}
.fl{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;}
footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--ink-light);}
footer a{color:var(--orange);text-decoration:none;}
@media(max-width:480px){.ct{grid-template-columns:50px 1fr auto;gap:0.75rem;}.dn{font-size:1.6rem;}}
</style>
</head>

function tog(i) { document.getElementById('c'+i).classList.toggle('open'); }

function renderList(data, containerId) {
  var el = document.getElementById(containerId);
  data.forEach(function(cat) {
    var rows = cat.items.map(function(item, j) {
      var id = containerId+'-'+j+'-'+cat.cat.replace(/\s/g,'');
      return '<div class="sr" id="'+id+'" onclick="this.classList.toggle(\'checked\')">' +
        '<div class="cc">'+chk+'</div>' +
        '<span class="in">'+item.n+'</span>' +
        '<span class="fp '+item.f+'">'+fLabel[item.f]+'</span>' +
        '<a class="mb" href="'+item.q+'" target="_blank" onclick="event.stopPropagation()">🛒 Meny</a>' +
      '</div>';
    }).join('');
    el.innerHTML += '<div class="ss"><div class="st">'+cat.cat+'</div><div class="si">'+rows+'</div></div>';
  });
}

function switchTab(name, btn) {
  document.querySelectorAll('.tp').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tbtn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
