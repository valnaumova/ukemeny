<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukemeny – Familien</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --paper: #F3EEE6;
    --ink: #1C1A17;
    --ink-muted: #6B6559;
    --ink-light: #A09890;
    --green: #2D5016;
    --green-bg: #EAF0E0;
    --orange: #C4521A;
    --orange-bg: #FAF0E8;
    --blue: #1A3A5C;
    --blue-bg: #E8EFF6;
    --amber: #8C5E00;
    --amber-bg: #FBF3E0;
    --border: rgba(28,26,23,0.1);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 2rem 1.5rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    max-width: 700px;
    margin: 0 auto;
  }
  .header-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .header-title em {
    font-style: italic;
    color: rgba(255,255,255,0.5);
  }
  .week-badge {
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    margin-top: 6px;
  }
  .tab-bar {
    display: flex;
    gap: 4px;
    max-width: 700px;
    margin: 1.5rem auto 0;
  }
  .tab-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 0.5px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--cream);
    color: var(--ink);
    border-color: var(--cream);
  }

  /* MAIN */
  main {
    max-width: 700px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* DAY CARDS */
  .day-card {
    background: white;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .day-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

  .day-card-top {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    align-items: center;
    gap: 1rem;
    padding: 1.1rem 1.25rem;
    cursor: pointer;
  }
  .day-col {
    text-align: center;
  }
  .day-name {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-light);
  }
  .day-num {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
  }
  .dish-info { min-width: 0; }
  .dish-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tag-poultry { background: #EEEDFE; color: #3C3489; }
  .tag-fish    { background: var(--blue-bg); color: var(--blue); }
  .tag-veg     { background: var(--green-bg); color: var(--green); }
  .tag-soup    { background: var(--amber-bg); color: var(--amber); }
  .tag-taco    { background: var(--orange-bg); color: var(--orange); }
  .tag-weekend { background: var(--paper); color: var(--ink-muted); }

  .dish-name {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.3;
    color: var(--ink);
  }
  .dish-time {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 3px;
  }
  .expand-icon {
    font-size: 18px;
    color: var(--ink-light);
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .day-card.open .expand-icon { transform: rotate(180deg); }

  .day-card-body {
    display: none;
    border-top: 0.5px solid var(--border);
    padding: 1rem 1.25rem 1.25rem;
    background: var(--paper);
  }
  .day-card.open .day-card-body { display: block; }

  .ing-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-light);
    margin-bottom: 6px;
  }
  .ing-list {
    font-size: 13px;
    color: var(--ink-muted);
    line-height: 1.8;
    margin-bottom: 1rem;
  }
  .recipe-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--orange);
    text-decoration: none;
    border: 0.5px solid currentColor;
    border-radius: 20px;
    padding: 6px 14px;
    transition: all 0.15s;
  }
  .recipe-link:hover { background: var(--orange); color: white; }

  /* SHOPPING LIST */
  .shop-section { margin-bottom: 1.5rem; }
  .shop-section-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .shop-items {
    background: white;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .shop-item {
    display: grid;
    grid-template-columns: 32px 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .shop-item:last-child { border-bottom: none; }
  .shop-item:hover { background: var(--paper); }
  .shop-item.checked { opacity: 0.45; }
  .check-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .shop-item.checked .check-circle {
    background: var(--green);
    border-color: var(--green);
  }
  .check-circle svg { display: none; }
  .shop-item.checked .check-circle svg { display: block; }
  .item-name {
    font-size: 14px;
    color: var(--ink);
  }
  .shop-item.checked .item-name { text-decoration: line-through; color: var(--ink-light); }
  .freq-pill {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .freq-weekly   { background: var(--green-bg); color: var(--green); }
  .freq-biweekly { background: #EEEDFE; color: #3C3489; }
  .freq-monthly  { background: var(--amber-bg); color: var(--amber); }
  .meny-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    background: var(--blue-bg);
    border-radius: 8px;
    padding: 4px 8px;
    text-decoration: none;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .meny-btn:hover { background: var(--blue); color: white; }

  /* FREQ LEGEND */
  .freq-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* FOOTER */
  .page-footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: var(--ink-light);
  }
  .page-footer a { color: var(--orange); text-decoration: none; }

  /* HIDDEN */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  @media (max-width: 480px) {
    .day-card-top { grid-template-columns: 48px 1fr auto; gap: 0.75rem; }
    .day-num { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-title">Uke&shy;meny<br><em>for familien</em></div>
    </div>
    <div class="week-badge" id="week-badge">Uke —</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('menu', this)">Middager</button>
    <button class="tab-btn" onclick="switchTab('shop', this)">Handlekurv</button>
    <button class="tab-btn" onclick="switchTab('fixed', this)">Faste varer</button>
  </div>
</header>

<main>

  <!-- MENU TAB -->
  <div class="tab-panel active" id="tab-menu">
    <div id="days-container"></div>
  </div>

  <!-- WEEKLY SHOPPING TAB -->
  <div class="tab-panel" id="tab-shop">
    <div class="freq-legend">
      <div class="legend-item"><span class="freq-pill freq-weekly">Ukentlig</span></div>
      <div class="legend-item"><span class="freq-pill freq-biweekly">Annenhver uke</span></div>
      <div class="legend-item"><span class="freq-pill freq-monthly">Månedlig</span></div>
    </div>
    <div id="shop-container"></div>
  </div>

  <!-- FIXED ITEMS TAB -->
  <div class="tab-panel" id="tab-fixed">
    <div id="fixed-container"></div>
  </div>

</main>

<div class="page-footer">
  Laget med ♥ · <a href="https://meny.no/nettbutikk" target="_blank">Bestill på meny.no</a>
</div>

<script>
// Set week number
const now = new Date();
const start = new Date(now.getFullYear(), 0, 1);
const week = Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
document.getElementById('week-badge').textContent = 'Uke ' + week;

// Days of week starting Monday
const DAYS = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const today = new Date();
const todayDow = today.getDay(); // 0=sun
const mondayOffset = todayDow === 0 ? -6 : 1 - todayDow;
function getDateForDay(i) {
  const d = new Date(today);
  d.setDate(today.getDate() + mondayOffset + i);
  return d.getDate();
}

const menu = [
  { label: 'Kylling', cls: 'tag-poultry',
    name: 'Creamy one pot med kylling og tomater',
    time: '25 min · One pot · Barnevennlig',
    link: 'https://oda.com/no/recipes/4806-ida-gran-jansen-creamy-one-pot-med-kylling-og-tomater/',
    ing: 'Kyllingfilet, hermetiske tomater, fløte, pasta, løk, hvitløk, basilikum, parmesan, olivenolje' },
  { label: 'Suppe', cls: 'tag-soup',
    name: 'Kremet soppsuppe med brød',
    time: '25 min · Vegetarvennlig',
    link: 'https://meny.no/oppskrifter/suppe/Kremet-soppsuppe/',
    ing: 'Sjampinjong, løk, hvitløk, fløte, smør, buljong, timian, soyasaus, grovt brød' },
  { label: 'Fisk', cls: 'tag-fish',
    name: 'Grønn risotto med scampi',
    time: '30 min · Litt fancy hverdagsmat',
    link: 'https://www.rema.no/oppskrifter/ris/gronn-risotto-med-scampi/',
    ing: 'Scampi, risottoris, ert, spinat, løk, hvitløk, buljong, parmesan, smør, sitron' },
  { label: 'Vegetar', cls: 'tag-veg',
    name: 'Chili sin carne',
    time: '30 min · Proteintett · Barnevennlig',
    link: 'https://meny.no/oppskrifter/vegetar/Chili-sin-carne/',
    ing: 'Hermetiske tomater, kidneybønner, mais, løk, hvitløk, paprika, chili, tacokrydder, rømme, ris' },
  { label: 'Taco / Pizza', cls: 'tag-taco',
    name: 'Kyllingbowl med søtpotet og quinoa',
    time: '30 min · Fredagsfavoritt',
    link: 'https://meny.no/oppskrifter/kylling/kyllingbowl-med-sotpotet',
    ing: 'Kyllingfilet, søtpotet, quinoa, avokado, rødkål, limejuice, koriander, tacokrydder, rømme' },
  { label: 'Helg', cls: 'tag-weekend',
    name: 'Høstgryte med rotgrønnsaker',
    time: '35 min · Mettende helgemat',
    link: 'http://meny.no/oppskrifter/vegetar/hostgryte/',
    ing: 'Gulrot, pastinakk, persillerot, løk, hermetiske tomater, buljong, timian, lammekjøtt (valgfritt), brød' },
  { label: 'Helg', cls: 'tag-weekend',
    name: 'Sandwich med halloumi og urtedressing',
    time: '20 min · Lett søndagsmiddag',
    link: 'https://meny.no/oppskrifter/sandwich/sandwich-med-halloumi-og-urtedressing/',
    ing: 'Halloumi 250g, ciabatta eller baguette, ruccola, tomat, rødløk, kesam, urter (basilikum, gressløk), sitron, olivenolje' },
];

const container = document.getElementById('days-container');
menu.forEach((d, i) => {
  container.innerHTML += `
    <div class="day-card" id="card-${i}">
      <div class="day-card-top" onclick="toggleCard(${i})">
        <div class="day-col">
          <div class="day-name">${DAYS[i]}</div>
          <div class="day-num">${getDateForDay(i)}</div>
        </div>
        <div class="dish-info">
          <span class="dish-tag ${d.cls}">${d.label}</span>
          <div class="dish-name">${d.name}</div>
          <div class="dish-time">${d.time}</div>
        </div>
        <div class="expand-icon">▾</div>
      </div>
      <div class="day-card-body">
        <div class="ing-label">Ingredienser</div>
        <div class="ing-list">${d.ing}</div>
        <a class="recipe-link" href="${d.link}" target="_blank">Åpne oppskrift →</a>
      </div>
    </div>`;
});

function toggleCard(i) {
  document.getElementById('card-' + i).classList.toggle('open');
}

// SHOPPING LIST
const shopCats = [
  { name: 'Kjøtt & fisk', items: [
    { n: 'Kyllingfilet 700g', q: 'kyllingfilet', f: 'weekly' },
    { n: 'Scampi 270g fiskemannen', q: 'scampi fiskemannen', f: 'weekly' },
    { n: 'Halloumi 250g', q: 'halloumi', f: 'weekly' },
  ]},
  { name: 'Meieri & egg', items: [
    { n: 'Lettmelk 0,5% Tine 1l × 2', q: 'lettmelk tine', f: 'weekly' },
    { n: 'Fløte 38% 2dl', q: 'fløte', f: 'weekly' },
    { n: 'Smør Tine 500g', q: 'smør tine', f: 'monthly' },
    { n: 'Egg 10-pk', q: 'egg', f: 'biweekly' },
    { n: 'Parmesan revet', q: 'parmesan', f: 'weekly' },
    { n: 'Cottage cheese 2% 400g', q: 'cottage cheese tine', f: 'weekly' },
    { n: 'Rømme 35cl', q: 'rømme', f: 'weekly' },
    { n: 'Kesam', q: 'kesam', f: 'weekly' },
  ]},
  { name: 'Grønnsaker & frukt', items: [
    { n: 'Sjampinjong 400g', q: 'sjampinjong', f: 'weekly' },
    { n: 'Søtpotet 400g', q: 'søtpotet', f: 'weekly' },
    { n: 'Spinat fersk 150g', q: 'spinat fersk', f: 'weekly' },
    { n: 'Paprika rød 3 stk', q: 'rød paprika', f: 'weekly' },
    { n: 'Løk 4 stk', q: 'løk', f: 'weekly' },
    { n: 'Rødløk 2 stk', q: 'rødløk', f: 'weekly' },
    { n: 'Hvitløk', q: 'hvitløk', f: 'weekly' },
    { n: 'Cherrytomater røde 2 pk', q: 'cherrytomater', f: 'weekly' },
    { n: 'Tomat 4 stk', q: 'tomat', f: 'weekly' },
    { n: 'Avokado 2 stk', q: 'avokado', f: 'weekly' },
    { n: 'Sitron 2 stk', q: 'sitron', f: 'weekly' },
    { n: 'Bananer First Price', q: 'bananer', f: 'weekly' },
    { n: 'Epler røde 1 kg', q: 'epler røde', f: 'weekly' },
    { n: 'Appelsin 4 stk', q: 'appelsin', f: 'weekly' },
    { n: 'Mango Cevita 2 stk', q: 'mango', f: 'weekly' },
  ]},
  { name: 'Tørrvarer & hermetikk', items: [
    { n: 'Pasta penne 500g', q: 'pasta penne', f: 'weekly' },
    { n: 'Risottoris arborio 500g', q: 'risottoris', f: 'weekly' },
    { n: 'Quinoa 400g', q: 'quinoa', f: 'weekly' },
    { n: 'Ris 500g', q: 'ris', f: 'weekly' },
    { n: 'Hermetiske tomater 2 boks', q: 'hermetiske tomater', f: 'weekly' },
    { n: 'Kidneybønner 1 boks', q: 'kidneybønner', f: 'weekly' },
    { n: 'Mais hermetikk', q: 'mais hermetikk', f: 'weekly' },
    { n: 'Frosne erter 400g', q: 'frosne erter', f: 'weekly' },
    { n: 'Kyllingbuljong', q: 'kyllingbuljong', f: 'monthly' },
    { n: 'Soyasaus', q: 'soyasaus', f: 'monthly' },
    { n: 'Olivenolje', q: 'olivenolje', f: 'monthly' },
    { n: 'Tacokrydder', q: 'tacokrydder', f: 'weekly' },
  ]},
  { name: 'Brød & bakst', items: [
    { n: 'Grovt brød', q: 'grovt brød', f: 'weekly' },
    { n: 'Ciabatta eller baguette', q: 'ciabatta', f: 'weekly' },
    { n: 'Knekkebrød', q: 'knekkebrød', f: 'weekly' },
  ]},
];

const fixedCats = [
  { name: 'Alltid hjemme – faste varer', items: [
    { n: 'Jordbærsyltetøy', q: 'jordbærsyltetøy', f: 'monthly' },
    { n: 'Bringebærsyltetøy', q: 'bringebærsyltetøy', f: 'monthly' },
    { n: 'Brunost G35', q: 'brunost', f: 'biweekly' },
    { n: 'Kaviar tube', q: 'kaviar tube', f: 'biweekly' },
    { n: 'Leverpostei', q: 'leverpostei', f: 'biweekly' },
    { n: 'Appelsinjuice', q: 'appelsinjuice', f: 'weekly' },
    { n: 'Yoghurt med frukt barn', q: 'yoghurt barn', f: 'weekly' },
    { n: 'Müsli / havregryn', q: 'müsli havregryn', f: 'weekly' },
    { n: 'Riskaker', q: 'riskaker', f: 'biweekly' },
    { n: 'Koljekaker 95g × 2', q: 'koljekaker', f: 'biweekly' },
  ]},
  { name: 'Bleier & hygiene', items: [
    { n: 'Libero trusebleier str. 6', q: 'libero trusebleier', f: 'monthly' },
    { n: 'Libero bleier str. 4', q: 'libero bleier', f: 'monthly' },
  ]},
];

const freqLabel = { weekly: 'Ukentlig', biweekly: '2 uker', monthly: 'Månedlig' };
const freqCls   = { weekly: 'freq-weekly', biweekly: 'freq-biweekly', monthly: 'freq-monthly' };

function menyUrl(q) {
  return 'https://meny.no/search?query=' + encodeURIComponent(q);
}

function renderShopList(cats, containerId) {
  const el = document.getElementById(containerId);
  cats.forEach(cat => {
    let rows = cat.items.map((item, j) => {
      const id = containerId + '-' + cat.name + '-' + j;
      return `<div class="shop-item" id="${id}" onclick="toggleItem('${id}')">
        <div class="check-circle">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="item-name">${item.n}</span>
        <span class="freq-pill ${freqCls[item.f]}">${freqLabel[item.f]}</span>
        <a class="meny-btn" href="${menyUrl(item.q)}" target="_blank" onclick="event.stopPropagation()">
          🛒 Meny
        </a>
      </div>`;
    }).join('');
    el.innerHTML += `<div class="shop-section">
      <div class="shop-section-title">${cat.name}</div>
      <div class="shop-items">${rows}</div>
    </div>`;
  });
}

renderShopList(shopCats, 'shop-container');
renderShopList(fixedCats, 'fixed-container');

function toggleItem(id) {
  document.getElementById(id).classList.toggle('checked');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
